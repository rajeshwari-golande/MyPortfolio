# Render Blueprint — deploy backend from GitHub (free tier, no credit card)
# Docs: docs/DEPLOY-FREE-NO-CARD.md

services:
  - type: web
    name: myportfolio-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: WEB3FORMS_ACCESS_KEY
        sync: false

